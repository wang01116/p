<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubLink Pro - 免客户端 Web 浏览器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg: #07090e; --s1: #0e1117; --s2: #141820; --s3: #1c2130;
  --b1: rgba(255,255,255,0.06); --b2: rgba(255,255,255,0.11);
  --tx: #dde2ee; --tm: #606880; --td: #3a4255; --acc: #3d7eff;
  --acc-rgb: 61, 126, 255; --grn: #00d68f; --red: #ff4d6a; --ylw: #ffbe0b;
  --mono: 'IBM Plex Mono', monospace; --sans: 'Space Grotesk', system-ui, sans-serif;
}

[data-theme="light"] {
  --bg: #f4f7fa; --s1: #ffffff; --s2: #edf2f7; --s3: #e2e8f0;
  --b1: rgba(0,0,0,0.06); --b2: rgba(0,0,0,0.1);
  --tx: #1a202c; --tm: #4a5568; --td: #a0aec0; --acc: #2563eb;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--tx); font-family: var(--sans); transition: background 0.3s; }

/* LOGIN SCREEN */
#setup-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.setup-card { width: 90%; max-width: 400px; padding: 32px; background: var(--s1); border-radius: 24px; border: 1px solid var(--b1); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }

/* MAIN APP */
.app { display: none; grid-template-rows: 56px 1fr; height: 100vh; }
.app.ready { display: grid; }
.topbar { display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--b1); background: var(--s1); gap: 12px; }
.logo { display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
.logo-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--acc); color: #fff; display: grid; place-items: center; }

.body { display: flex; overflow: hidden; position: relative; }

/* SIDEBAR */
.sidebar { width: 320px; background: var(--s1); border-right: 1px solid var(--b1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
.sidebar.collapsed { width: 0; border: none; }
.sidebar-inner { width: 320px; height: 100%; display: flex; flex-direction: column; padding: 20px; }

/* BROWSER AREA */
.main-content { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
.browser-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--s1); border-bottom: 1px solid var(--b1); }
.url-input { flex: 1; background: var(--s2); border: 1px solid var(--b1); border-radius: 10px; padding: 10px 14px; color: var(--tx); font-family: var(--mono); font-size: 14px; outline: none; }
.url-input:focus { border-color: var(--acc); }

.iframe-container { flex: 1; position: relative; }
iframe { width: 100%; height: 100%; border: none; background: #fff; }

/* COMMON UI */
.btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-family: var(--sans); transition: 0.2s; }
.btn-primary { background: var(--acc); color: #fff; width: 100%; }
.btn-icon { background: none; color: var(--tm); font-size: 20px; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; }
.btn-icon:hover { background: var(--s3); color: var(--tx); }

textarea { width: 100%; background: var(--s2); border: 1px solid var(--b1); border-radius: 12px; padding: 12px; color: var(--tx); font-family: var(--mono); font-size: 11px; resize: none; outline: none; }
.node-list { flex: 1; overflow-y: auto; margin-top: 20px; }
.node-item { padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 6px; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
.node-item:hover { background: var(--s2); }
.node-item.active { background: rgba(var(--acc-rgb), 0.1); border-color: var(--acc); }
.proto-tag { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: var(--s3); color: var(--tm); text-transform: uppercase; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1c2130; color: #fff; padding: 12px 24px; border-radius: 12px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); opacity: 0; z-index: 2000; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) { .sidebar { position: absolute; z-index: 100; height: 100%; } }
</style>
</head>
<body>

<!-- 登录/配置墙 -->
<div id="setup-screen">
  <div class="setup-card">
    <div style="font-size: 48px; margin-bottom: 16px;">⚡</div>
    <h2 style="margin-bottom: 8px;">连接 SubLink Pro</h2>
    <p style="color: var(--tm); font-size: 14px; margin-bottom: 24px;">请输入部署好的 Cloudflare Worker 地址</p>
    <input type="text" id="setup-worker-url" class="url-input" placeholder="https://xxx.workers.dev" style="margin-bottom: 16px; text-align: center; width: 100%;">
    <button class="btn btn-primary" onclick="initApp()">连接验证</button>
    <div id="setup-status" style="margin-top: 16px; font-size: 12px;"></div>
  </div>
</div>

<!-- 主程序 -->
<div class="app" id="main-app">
  <header class="topbar">
    <button class="btn-icon" onclick="toggleSidebar()">☰</button>
    <div class="logo" onclick="location.reload()">
      <div class="logo-icon">⚡</div>
      <span>SubLink Pro</span>
    </div>
    <div style="margin-left: auto; display: flex; gap: 10px;">
      <button class="btn-icon" onclick="toggleTheme()">🌓</button>
      <div id="status-dot" style="width: 10px; height: 10px; border-radius: 50%; background: #666; align-self: center;"></div>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <h4 style="font-size: 11px; color: var(--tm); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">手动输入节点 URI</h4>
        <textarea id="node-input" rows="6" placeholder="ss://...&#10;vmess://...&#10;vless://..."></textarea>
        <button class="btn btn-primary" style="margin-top: 10px;" onclick="parseNodes()">解析节点</button>
        
        <div class="node-list" id="node-list">
           <div style="text-align: center; color: var(--td); margin-top: 40px; font-size: 13px;">暂无节点数据</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="browser-bar">
        <button class="btn-icon" onclick="browserBack()">←</button>
        <input type="text" id="browser-input" class="url-input" placeholder="输入网址或搜索关键词..." onkeydown="if(event.key==='Enter')browserGo()">
        <button class="btn btn-primary" style="width: auto; padding: 0 20px;" onclick="browserGo()">前往</button>
      </div>
      <div class="iframe-container" id="iframe-wrap">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--tm); background: var(--bg); text-align: center; padding: 20px;">
          <div style="font-size: 64px; margin-bottom: 20px;">🌐</div>
          <h3>自由浏览已开启</h3>
          <p style="margin-top: 10px; max-width: 400px; font-size: 14px; opacity: 0.7;">
            在上方输入网址或关键词，流量将通过 Worker 节点中转。<br>支持网页跳转、图片显示及文本查阅。
          </p>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let workerUrl = '';
let nodes = [];

// 1. 初始化与登录
async function initApp() {
  const input = document.getElementById('setup-worker-url').value.trim().replace(/\/+$/, '');
  const status = document.getElementById('setup-status');
  if(!input) return;

  status.style.color = 'var(--acc)';
  status.textContent = '正在连接 Worker...';

  try {
    const res = await fetch(input + '/health', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    if(data.ok) {
      workerUrl = input;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('main-app').classList.add('ready');
      document.getElementById('status-dot').style.background = 'var(--grn)';
      showToast('✅ Worker 连接成功');
    }
  } catch (e) {
    status.style.color = 'var(--red)';
    status.textContent = '连接失败，请检查 URL 或 Worker CORS 设置';
  }
}

// 2. 节点解析与乱码修复
function safeDecode(str) {
  try {
    let t = decodeURIComponent(str);
    if(t.includes('%')) t = decodeURIComponent(t);
    return t;
  } catch(e) { 
    try { return atob(str.replace(/-/g, '+').replace(/_/g, '/')); } catch(e2) { return str; }
  }
}

function parseNodes() {
  const input = document.getElementById('node-input').value;
  const lines = input.split('\n');
  const tempNodes = [];

  lines.forEach(line => {
    line = line.trim();
    if(!line) return;
    
    try {
      let name = '未命名节点';
      let proto = line.split('://')[0];
      let part = line;

      // 提取名称（修复乱码关键）
      if(line.includes('#')) {
        const slices = line.split('#');
        name = safeDecode(slices[1]);
        part = slices[0];
      }

      // 提取地址
      const addrPart = part.includes('@') ? part.split('@')[1] : part.split('://')[1];
      const host = addrPart ? addrPart.split(':')[0].split('?')[0] : 'Unknown';

      tempNodes.push({ proto, name, host, raw: line });
    } catch(e) {}
  });

  nodes = tempNodes;
  renderNodes();
  showToast(`成功解析 ${nodes.length} 个节点`);
}

function renderNodes() {
  const list = document.getElementById('node-list');
  list.innerHTML = nodes.map((n, i) => `
    <div class="node-item" onclick="selectNode(${i})">
      <span class="proto-tag">${n.proto}</span>
      <div style="flex:1; min-width:0">
        <div style="font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${n.name}</div>
        <div style="font-family:var(--mono); font-size:10px; color:var(--tm);">${n.host}</div>
      </div>
    </div>
  `).join('');
}

function selectNode(i) {
  showToast(`已切换至: ${nodes[i].name}`);
  document.querySelectorAll('.node-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
}

// 3. 增强浏览器逻辑
function browserGo() {
  let val = document.getElementById('browser-input').value.trim();
  if(!val) return;

  let targetUrl = val;
  // 判断是否是搜索关键词
  if(!val.includes('.') || val.includes(' ')) {
    targetUrl = `https://www.google.com/search?q=${encodeURIComponent(val)}`;
  } else {
    if(!/^https?:\/\//i.test(val)) targetUrl = 'https://' + val;
  }

  document.getElementById('browser-input').value = targetUrl;
  const wrap = document.getElementById('iframe-wrap');
  
  // 建立中转
  const proxied = `${workerUrl}/proxy?url=${encodeURIComponent(targetUrl)}`;
  wrap.innerHTML = `<iframe src="${proxied}" id="browser-frame"></iframe>`;
  showToast('🚀 页面跳转中...');
}

function browserBack() {
  const f = document.getElementById('browser-frame');
  if(f) f.contentWindow.history.back();
}

// 4. UI 交互
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleTheme() {
  const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', t);
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
