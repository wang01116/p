<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SubLink Pro Ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono&display=swap');

:root {
  --m3-bg: #0d1117; --m3-surf: #161b22; --m3-prim: #58a6ff; --m3-on-prim: #ffffff;
  --m3-outline: #30363d; --m3-txt: #e6edf3; --m3-sec: #8b949e;
}
[data-theme="light"] {
  --m3-bg: #f6f8fa; --m3-surf: #ffffff; --m3-prim: #0969da; --m3-on-prim: #ffffff;
  --m3-outline: #d0d7de; --m3-txt: #1f2328; --m3-sec: #656d76;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Google Sans', sans-serif; background: var(--m3-bg); color: var(--m3-txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* SETUP */
#setup { position: fixed; inset: 0; z-index: 2000; background: var(--m3-bg); display: flex; align-items: center; justify-content: center; }
.card-setup { background: var(--m3-surf); padding: 32px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--m3-outline); }

/* TOPBAR */
.navbar { height: 64px; display: flex; align-items: center; padding: 0 16px; background: var(--m3-surf); border-bottom: 1px solid var(--m3-outline); z-index: 100; gap: 12px; }
.nav-title { font-size: 18px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* LAYOUT */
.main-container { flex: 1; display: flex; position: relative; overflow: hidden; }

/* SIDEBAR - 响应式处理 */
.sidebar { 
    width: 320px; background: var(--m3-bg); border-right: 1px solid var(--m3-outline); 
    display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 150; 
}
@media (max-width: 768px) {
    .sidebar { position: absolute; height: 100%; left: -320px; width: 280px; }
    .sidebar.show { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 140; }
    .sidebar-overlay.show { display: block; }
}

.sidebar-inner { padding: 20px; display: flex; flex-direction: column; height: 100%; }

/* BROWSER */
.browser-area { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
.browser-tools { padding: 8px 12px; background: var(--m3-surf); border-bottom: 1px solid var(--m3-outline); display: flex; gap: 8px; }
.chip-container { display: flex; gap: 6px; padding: 8px 12px; background: var(--m3-bg); overflow-x: auto; border-bottom: 1px solid var(--m3-outline); scrollbar-width: none; }
.chip-container::-webkit-scrollbar { display: none; }
.m3-chip { padding: 6px 14px; background: var(--m3-surf); border: 1px solid var(--m3-outline); border-radius: 8px; font-size: 12px; white-space: nowrap; cursor: pointer; }

/* INPUTS */
.m3-input { width: 100%; background: var(--m3-surf); border: 1px solid var(--m3-outline); border-radius: 12px; padding: 10px 16px; color: var(--m3-txt); font-family: 'Roboto Mono', monospace; font-size: 14px; outline: none; }
.m3-btn { background: var(--m3-prim); color: var(--m3-on-prim); padding: 10px 20px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* NODE LIST */
.node-card { background: var(--m3-surf); padding: 16px; border-radius: 20px; border: 1px solid var(--m3-outline); margin-bottom: 10px; cursor: pointer; position: relative; }
.node-card.active { border-color: var(--m3-prim); background: rgba(88, 166, 255, 0.1); }
.node-info { font-size: 11px; color: var(--m3-sec); font-family: 'Roboto Mono'; margin-top: 4px; }

iframe { flex: 1; width: 100%; height: 100%; border: none; background: #fff; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #21262d; color: #fff; padding: 10px 20px; border-radius: 12px; opacity: 0; transition: 0.3s; z-index: 3000; font-size: 13px; }
</style>
</head>
<body>

<div id="setup">
  <div class="card-setup">
    <h2 style="margin-bottom:12px">SubLink Pro Ultra</h2>
    <input type="text" id="w-url" class="m3-input" placeholder="Worker URL (https://...)" style="text-align:center; margin-bottom:20px">
    <button class="m3-btn" style="width:100%" onclick="connect()">进入系统</button>
  </div>
</div>

<div class="navbar">
  <button class="m3-btn" style="padding:8px; background:none" onclick="toggleSidebar()">☰</button>
  <div class="nav-title">SubLink Ultra</div>
  <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='light'?'dark':'light')" style="background:none; border:none; font-size:20px">🌓</button>
</div>

<div class="main-container">
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <textarea id="raw" class="m3-input" rows="4" placeholder="粘贴节点 URI..."></textarea>
      <button class="m3-btn" style="margin: 12px 0" onclick="parse()">解析节点</button>
      <div id="list" style="flex:1; overflow-y:auto"></div>
    </div>
  </aside>

  <main class="browser-area">
    <div class="browser-tools">
      <input type="text" id="b-url" class="m3-input" placeholder="搜索或输入网址..." style="margin:0" onkeydown="if(event.key==='Enter')go()">
      <button class="m3-btn" onclick="go()">前往</button>
    </div>
    <div class="chip-container">
      <div class="m3-chip" onclick="quick('https://duckduckgo.com')">🦆 DuckDuckGo</div>
      <div class="m3-chip" onclick="quick('https://nitter.net')">🐦 Nitter (X)</div>
      <div class="m3-chip" onclick="quick('https://www.reddit.com')">🤖 Reddit</div>
      <div class="m3-chip" onclick="quick('https://www.youtube.com')">📺 YouTube</div>
      <div class="m3-chip" onclick="quick('https://music.youtube.com')">🎵 YT Music</div>
      <div class="m3-chip" onclick="quick('https://www.bbc.com/news')">🇬🇧 BBC News</div>
      <div class="m3-chip" onclick="quick('https://www.economist.com')">🗞️ Economist</div>
      <div class="m3-chip" onclick="quick('https://github.com')">🐙 GitHub</div>
    </div>
    <div id="view" style="flex:1; display:flex">
      <div style="margin:auto; text-align:center; color:var(--m3-sec); padding:20px">
        <p style="font-size:48px; margin-bottom:10px">📡</p>
        <p>请在左侧解析并选择节点</p>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
let worker = '';
let nodes = [];

async function connect() {
  const url = document.getElementById('w-url').value.trim().replace(/\/+$/, '');
  if (!url) return;
  try {
    const res = await fetch(url + '/health');
    if (res.ok) {
      worker = url;
      document.getElementById('setup').style.display = 'none';
      showToast("Worker 已连接");
    }
  } catch(e) { alert("连接失败"); }
}

function getFlag(name) {
  const map = { "美国": "🇺🇸", "香港": "🇭🇰", "台湾": "🇹🇼", "日本": "🇯🇵", "新加坡": "🇸🇬", "英国": "🇬🇧", "德国": "🇩🇪", "中国": "🇨🇳" };
  for(let k in map) if(name.includes(k)) return map[k];
  return "🌐";
}

function parse() {
  const raw = document.getElementById('raw').value;
  nodes = raw.split('\n').filter(l => l.includes('://')).map(l => {
    let name = "未命名", proto = l.split('://')[0];
    if(l.includes('#')) name = decodeURIComponent(l.split('#').pop());
    else if(proto === 'vmess') {
        try { name = JSON.parse(atob(l.split('://')[1])).ps; } catch(e) {}
    }
    return { name, proto, raw: l, ms: null };
  });
  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = nodes.map((n, i) => `
    <div class="node-card" id="n-${i}" onclick="selectNode(${i})">
      <div style="font-weight:500">${getFlag(n.name)} ${n.name}</div>
      <div class="node-info">${n.proto.toUpperCase()} | 点击测速</div>
      <div style="position:absolute; right:16px; top:16px; font-size:10px; color:var(--m3-prim)" id="ms-${i}"></div>
    </div>
  `).join('');
}

async function selectNode(i) {
  document.querySelectorAll('.node-card').forEach((c, idx) => c.classList.toggle('active', i===idx));
  const start = Date.now();
  document.getElementById(`ms-${i}`).textContent = "测速中...";
  try {
    await fetch(`${worker}/?url=${encodeURIComponent('https://www.google.com/favicon.ico')}`, { mode: 'no-cors' });
    document.getElementById(`ms-${i}`).textContent = (Date.now() - start) + "ms";
  } catch(e) { document.getElementById(`ms-${i}`).textContent = "超时"; }
  if(window.innerWidth <= 768) toggleSidebar();
}

function go() {
  let val = document.getElementById('b-url').value.trim();
  if(!val) return;
  let url = val;
  if(!val.includes('.') || val.includes(' ')) url = "https://duckduckgo.com/?q=" + encodeURIComponent(val);
  else if(!val.startsWith('http')) url = "https://" + val;
  
  document.getElementById('b-url').value = url;
  document.getElementById('view').innerHTML = `<iframe src="${worker}/?url=${encodeURIComponent(url)}" allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;
}

function quick(u) { document.getElementById('b-url').value = u; go(); }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}
function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 3000);
}
</script>
</body>
</html>
